# AI-NAS — Full-Stack Docker Compose
#
# Orchestrates:
#   - ainas-backend (FastAPI + AI models)
#   - elasticsearch (RAG vector store)
#   - kibana        (Elasticsearch UI)
#   - prometheus    (observability / metrics)
#
# Usage:
#   docker compose up -d                                          # all services
#   docker compose up -d ainas-backend                            # backend only
#   docker compose up -d ainas-backend elasticsearch              # backend + RAG
#   docker compose run --rm ainas-backend alembic upgrade head    # run migrations
#
# Environment file precedence: .env (root) > shell env vars

services:

  # ─── AI-NAS Backend ─────────────────────────────────────────────────────────
  ainas-backend:
    build:
      context: .
      dockerfile: backend/containerize/Dockerfile
      args:
        BASE_IMAGE: ${AINAS_BASE_IMAGE:-python:3.12-slim}
        TORCH_INDEX_URL: ${AINAS_TORCH_INDEX_URL:-}
    image: ainas-backend:${AINAS_IMAGE_TAG:-latest}
    container_name: ainas-backend
    restart: unless-stopped
    ports:
      - "${AINAS_PORT:-9026}:9026"
    environment:
      AINAS_ADDR: "0.0.0.0"
      AINAS_PORT: "9026"
      AINAS_ADVERTISE_ADDR: ${AINAS_ADVERTISE_ADDR:-ainas-backend}
      AINAS_ENABLE_AI: ${AINAS_ENABLE_AI:-true}
      AINAS_ES_URL: ${AINAS_ES_URL:-http://elasticsearch:9200}
      AINAS_ES_INDEX: ${AINAS_ES_INDEX:-ainas}
      AINAS_STORAGE_PATH: /app/storage
      AINAS_LOG_LEVEL: ${AINAS_LOG_LEVEL:-INFO}
      AINAS_LOG_FILE: /app/logs/backend.log
      AINAS_AI_CHAT_MODEL: ${AINAS_AI_CHAT_MODEL:-}
      AINAS_AI_VISION_MODEL: ${AINAS_AI_VISION_MODEL:-}
      AINAS_EMBEDDING_MODEL: ${AINAS_EMBEDDING_MODEL:-}
      AINAS_AI_API_URL: ${AINAS_AI_API_URL:-}
      AINAS_AI_API_KEY: ${AINAS_AI_API_KEY:-}
      AI_GPU_LAYERS: ${AI_GPU_LAYERS:-0}
      AINAS_HF_API_TOKEN: ${AINAS_HF_API_TOKEN:-}
    volumes:
      # Persist user data, thumbnails, and SQLite database
      - ainas-storage:/app/storage
      # Persist AI model cache (GGUF files, HF cache) so it survives rebuilds
      - ainas-models:/app/backend/services/ai/models
      # Persist logs
      - ainas-logs:/app/logs
      # Optional: mount a custom config.yaml
      # - ./backend/config.yaml:/app/backend/config.yaml:ro
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:9026/api/status"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s
    depends_on:
      elasticsearch:
        condition: service_healthy
    networks:
      - ainas-network

  # ─── Elasticsearch (RAG vector store) ───────────────────────────────────────
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:9.4.2
    container_name: ainas-elasticsearch
    restart: unless-stopped
    environment:
      - node.name=elasticsearch
      - discovery.type=single-node
      - bootstrap.memory_lock=true
      - "ES_JAVA_OPTS=-Xms${ES_MEM_LIMIT:-2g} -Xmx${ES_MEM_LIMIT:-2g}"
      - xpack.security.enabled=false
      - xpack.security.enrollment.enabled=false
      - xpack.security.http.ssl.enabled=false
      - xpack.security.transport.ssl.enabled=false
    ulimits:
      memlock:
        soft: -1
        hard: -1
    volumes:
      - es_data:/usr/share/elasticsearch/data
    ports:
      - "${ES_PORT:-9200}:9200"
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:9200/_cluster/health | grep -vq '\"status\":\"red\"'"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - ainas-network

  # ─── Kibana (Elasticsearch dashboard — optional) ────────────────────────────
  kibana:
    image: docker.elastic.co/kibana/kibana:9.4.2
    container_name: ainas-kibana
    restart: unless-stopped
    profiles:
      - kibana           # start with: docker compose --profile kibana up -d
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    ports:
      - "${KIBANA_PORT:-5601}:5601"
    depends_on:
      elasticsearch:
        condition: service_healthy
    networks:
      - ainas-network

  # ─── Prometheus (metrics collection — optional) ─────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: ainas-prometheus
    restart: unless-stopped
    profiles:
      - observability    # start with: docker compose --profile observability up -d
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    volumes:
      - ./thirdservices/observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
    networks:
      - ainas-network

networks:
  ainas-network:
    name: ainas-network
    driver: bridge

volumes:
  ainas-storage:
    driver: local
  ainas-models:
    driver: local
  ainas-logs:
    driver: local
  es_data:
    driver: local
  prometheus_data:
    driver: local
