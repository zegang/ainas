global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: "ai-nas-backend"
    metrics_path: "/metrics"
    static_configs:
      # Assuming the backend is reachable via the docker bridge or host IP
      - targets: ["host.docker.internal:9026"]