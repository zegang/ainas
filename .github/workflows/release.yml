name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  # ─── GitHub Pages — deploy docs before builds start ──────────────
  docs:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Deploy docs to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs
          destination_dir: .
          keep_files: false
          publish_branch: gh-pages

  # ─── Flutter Web build (shared by all backend Docker variants) ─────
  ainas-front-web:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.44.3"
          channel: stable

      - working-directory: frontend
        run: |
          if [[ ! -d "web" ]]; then
            flutter create --platforms web .
          fi
          flutter pub get

      - name: Build web (release)
        working-directory: frontend
        run: flutter build web --release

      - name: Create web archive
        run: tar czf ainas-web.tar.gz -C frontend/build/web .

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: ainas-web.tar.gz
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/upload-artifact@v4
        with:
          name: ainas-front-web
          path: frontend/build/web

  # ─── Backend Docker images: CPU ────────────────────────────────
  backend-image-cpu:
    needs: ainas-front-web
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: ainas-front-web
          path: frontend/build/web

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate tags
        id: tags
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/backend
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: backend/containerize/Dockerfile
          push: true
          build-args: |
            BASE_IMAGE=python:3.12-slim
            BUILDER_BASE_IMAGE=python:3.12-slim
            TORCH_INDEX_URL=""
            LLAMA_CPP_CMAKE_ARGS=""
          tags: ${{ steps.tags.outputs.tags }}
          labels: ${{ steps.tags.outputs.labels }}

  # ─── Backend Docker images: CUDA ───────────────────────────────
  backend-image-cuda:
    needs: ainas-front-web
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: ainas-front-web
          path: frontend/build/web

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate tags
        id: tags
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/backend
          tags: |
            type=semver,pattern={{version}}-cuda
            type=semver,pattern={{major}}.{{minor}}-cuda
            type=raw,value=latest-cuda,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: backend/containerize/Dockerfile
          push: true
          build-args: |
            BASE_IMAGE=nvidia/cuda:12.4.1-runtime-ubuntu22.04
            BUILDER_BASE_IMAGE=nvidia/cuda:12.4.1-devel-ubuntu22.04
            TORCH_INDEX_URL=https://download.pytorch.org/whl/cu124
            LLAMA_CPP_CMAKE_ARGS=-DGGML_CUDA=ON
          tags: ${{ steps.tags.outputs.tags }}
          labels: ${{ steps.tags.outputs.labels }}

  # ─── Backend Docker images: ROCm ───────────────────────────────
  backend-image-rocm:
    needs: ainas-front-web
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: ainas-front-web
          path: frontend/build/web

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate tags
        id: tags
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/backend
          tags: |
            type=semver,pattern={{version}}-rocm
            type=semver,pattern={{major}}.{{minor}}-rocm
            type=raw,value=latest-rocm,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: backend/containerize/Dockerfile
          push: true
          build-args: |
            BASE_IMAGE=rocm/pytorch:rocm7.2.4_ubuntu24.04_py3.12_pytorch_release_2.10.0
            BUILDER_BASE_IMAGE=rocm/pytorch:rocm7.2.4_ubuntu24.04_py3.12_pytorch_release_2.10.0
            TORCH_INDEX_URL=https://download.pytorch.org/whl/rocm7.2
            LLAMA_CPP_CMAKE_ARGS=-DGGML_HIPBLAS=ON
          tags: ${{ steps.tags.outputs.tags }}
          labels: ${{ steps.tags.outputs.labels }}

  # ─── Android APK ───────────────────────────────────────────────────
  ainas-front-android:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.44.3"
          channel: stable

      - uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"

      - uses: android-actions/setup-android@v3

      - working-directory: frontend
        run: |
          if [[ ! -d "android" ]]; then
            flutter create --platforms android .
          fi
          flutter pub get

      - name: Build APK
        working-directory: frontend
        run: flutter build apk --release --android-skip-build-dependency-validation

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: frontend/build/app/outputs/flutter-apk/app-release.apk
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/upload-artifact@v4
        with:
          name: ainas-android-frontend
          path: frontend/build/app/outputs/flutter-apk/app-release.apk

  # ─── iOS (unsigned archive) ────────────────────────────────────────
  ainas-front-ios:
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.44.3"
          channel: stable

      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest

      - working-directory: frontend
        run: |
          if [[ ! -d "ios" ]]; then
            flutter create --platforms ios .
          fi
          flutter pub get

      - name: Build iOS (no codesign)
        working-directory: frontend
        run: flutter build ios --release --no-codesign

      - name: Archive .app
        run: ditto -c -k --keepParent frontend/build/ios/iphoneos/Runner.app ainas-front-ios.zip

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: ainas-front-ios.zip
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/upload-artifact@v4
        with:
          name: ainas-front-ios
          path: ainas-front-ios.zip

  # ─── macOS ─────────────────────────────────────────────────────────
  ainas-front-macos:
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.44.3"
          channel: stable

      - working-directory: frontend
        run: |
          if [[ ! -d "macos" ]]; then
            flutter create --platforms macos .
          fi
          flutter pub get

      - name: Build macOS
        working-directory: frontend
        run: flutter build macos --release

      - name: Archive .app
        run: ditto -c -k --keepParent frontend/build/macos/Build/Products/Release/Runner.app ainas-front-macos.zip

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: ainas-front-macos.zip
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/upload-artifact@v4
        with:
          name: ainas-front-macos
          path: ainas-front-macos.zip

  # ─── Linux ─────────────────────────────────────────────────────────
  ainas-front-linux:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.44.3"
          channel: stable

      - name: Install Linux build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build pkg-config \
            libgtk-3-dev liblzma-dev libstdc++-12-dev

      - working-directory: frontend
        run: |
          if [[ ! -d "linux" ]]; then
            flutter create --platforms linux .
          fi
          flutter pub get

      - name: Build Linux
        working-directory: frontend
        run: flutter build linux --release

      - name: Create tar.gz
        run: tar czf ainas-front-linux.tar.gz -C frontend/build/linux/x64/release/bundle .

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: ainas-front-linux.tar.gz
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/upload-artifact@v4
        with:
          name: ainas-front-linux
          path: ainas-front-linux.tar.gz

  # ─── Windows ───────────────────────────────────────────────────────
  ainas-front-windows:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.44.3"
          channel: stable

      - working-directory: frontend
        shell: bash
        run: |
          if [[ ! -d "windows" ]]; then
            flutter create --platforms windows .
          fi
          flutter pub get

      - name: Build Windows
        working-directory: frontend
        run: flutter build windows --release

      - name: Create zip
        working-directory: frontend\build\windows\x64\runner\Release
        run: |
          Compress-Archive -Path * -DestinationPath ${{ github.workspace }}/ainas-front-windows.zip

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: ainas-front-windows.zip
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/upload-artifact@v4
        with:
          name: ainas-front-windows
          path: ainas-front-windows.zip

  # ─── C++ Backend: Linux ─────────────────────────────────────────────
  ainas-backendcpp-linux:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libavahi-client-dev pkg-config

      - name: Configure CMake
        working-directory: backendcpp
        run: |
          mkdir -p build
          cmake -S . -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        working-directory: backendcpp
        run: cmake --build build --parallel --config Release

      - name: Package binary
        run: |
          cd backendcpp/build/src
          tar czf ainas-backend-linux.tar.gz ainas-backend-cpp

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: ainas-backendcpp-linux.tar.gz
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/upload-artifact@v4
        with:
          name: ainas-backendcpp-linux
          path: ainas-backendcpp-linux.tar.gz

  # ─── C++ Backend: macOS ──────────────────────────────────────────────
  ainas-backendcpp-macos:
    runs-on: macos-latest
    defaults:
      run:
        shell: bash
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Configure CMake
        working-directory: backendcpp
        run: |
          mkdir -p build
          cmake -S . -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        working-directory: backendcpp
        run: cmake --build build --parallel --config Release

      - name: Package binary
        run: |
          cd backendcpp/build/src
          tar czf ainas-backend-macos.tar.gz ainas-backend-cpp

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: ainas-backendcpp-macos.tar.gz
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/upload-artifact@v4
        with:
          name: ainas-backendcpp-macos
          path: ainas-backendcpp-macos.tar.gz

  # ─── C++ Backend: Windows ───────────────────────────────────────────
  ainas-backendcpp-windows:
    runs-on: windows-latest
    defaults:
      run:
        shell: bash
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Configure CMake
        working-directory: backendcpp
        run: |
          mkdir -p build
          cmake -S . -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        working-directory: backendcpp
        run: cmake --build build --parallel --config Release

      - name: Package binary
        run: |
          cd backendcpp/build/src
          tar czf ainas-backend-windows.tar.gz ainas-backend-cpp.exe

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: ainas-backendcpp-windows.tar.gz
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/upload-artifact@v4
        with:
          name: ainas-backendcpp-windows
          path: ainas-backendcpp-windows.tar.gz

  # ─── Full bundles: Flutter frontend + C++ backend ──────────────────
  #
  # Each "ainas-full-*" job waits for BOTH the frontend build and the
  # matching backendcpp build, then repacks them into a single archive
  # that users can download and run without extra steps.
  #
  # Android / iOS use CMake cross-compilation (NDK / Xcode) to produce
  # an arm64 (and x86_64 for Android) backend binary that is embedded
  # into the app package so the Flutter app can extract and launch it.
  # ────────────────────────────────────────────────────────────────────

  # ── Linux full bundle ──────────────────────────────────────────────
  ainas-full-linux:
    needs: [ainas-front-linux, ainas-backendcpp-linux]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download Flutter Linux bundle
        uses: actions/download-artifact@v4
        with:
          name: ainas-front-linux          # tar.gz uploaded by the 'ainas-front-linux' job
          path: dl/linux

      - name: Download C++ backend (Linux)
        uses: actions/download-artifact@v4
        with:
          name: ainas-backendcpp-linux  # tar.gz uploaded by the 'ainas-backendcpp-linux' job
          path: dl/backend-linux

      - name: Assemble bundle
        run: |
          mkdir -p bundle
          # Extract Flutter bundle (preserves lib/, data/, etc.)
          tar xzf dl/linux/ainas-front-linux.tar.gz -C bundle
          # Extract backend binary directly into bundle root
          tar xzf dl/backend-linux/ainas-backendcpp-linux.tar.gz -C bundle
          chmod +x bundle/ainas-backend-cpp || true

      - name: Create archive
        run: tar czf ainas-full-linux.tar.gz -C bundle .

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: ainas-full-linux.tar.gz
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/upload-artifact@v4
        with:
          name: ainas-full-linux
          path: ainas-full-linux.tar.gz

  # ── macOS full bundle ──────────────────────────────────────────────
  ainas-full-macos:
    needs: [ainas-front-macos, ainas-backendcpp-macos]
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - name: Download Flutter macOS app
        uses: actions/download-artifact@v4
        with:
          name: ainas-front-macos          # zip of Runner.app
          path: dl/macos

      - name: Download C++ backend (macOS)
        uses: actions/download-artifact@v4
        with:
          name: ainas-backendcpp-macos
          path: dl/backend-macos

      - name: Assemble bundle
        run: |
          mkdir -p staging
          # Unzip Flutter .app bundle
          unzip -q dl/macos/ainas-front-macos.zip -d staging
          APP=$(find staging -maxdepth 1 -name "*.app" | head -1)
          # Extract backend binary next to the Flutter app binary
          MACOS_DIR="$APP/Contents/MacOS"
          tar xzf dl/backend-macos/ainas-backendcpp-macos.tar.gz -C "$MACOS_DIR"
          chmod +x "$MACOS_DIR/ainas-backend-cpp" || true

      - name: Create archive
        run: |
          APP=$(find staging -maxdepth 1 -name "*.app" | head -1)
          ditto -c -k --keepParent "$APP" ainas-full-macos.zip

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: ainas-full-macos.zip
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/upload-artifact@v4
        with:
          name: ainas-full-macos
          path: ainas-full-macos.zip

  # ── Windows full bundle ────────────────────────────────────────────
  ainas-full-windows:
    needs: [ainas-front-windows, ainas-backendcpp-windows]
    runs-on: windows-latest
    defaults:
      run:
        shell: bash
    permissions:
      contents: write

    steps:
      - name: Download Flutter Windows bundle
        uses: actions/download-artifact@v4
        with:
          name: ainas-front-windows        # zip of runner/Release contents
          path: dl/windows

      - name: Download C++ backend (Windows)
        uses: actions/download-artifact@v4
        with:
          name: ainas-backendcpp-windows
          path: dl/backend-windows

      - name: Assemble bundle
        run: |
          mkdir -p bundle
          unzip -q dl/windows/ainas-front-windows.zip -d bundle
          # Extract backend binary into the bundle directory
          tar xzf dl/backend-windows/ainas-backendcpp-windows.tar.gz -C bundle

      - name: Create zip
        shell: pwsh
        run: |
          Compress-Archive -Path bundle\* `
            -DestinationPath "${{ github.workspace }}\ainas-full-windows.zip"

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: ainas-full-windows.zip
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/upload-artifact@v4
        with:
          name: ainas-full-windows
          path: ainas-full-windows.zip

  # ── Android full bundle (APK + embedded backend binaries) ──────────
  #
  # The C++ backend is cross-compiled for Android arm64-v8a and x86_64
  # using the Android NDK. The resulting binaries are packed into the
  # APK's assets/backend/ directory so the Flutter app can extract and
  # execute them at runtime via the app's private files directory.
  # ────────────────────────────────────────────────────────────────────
  ainas-full-android:
    needs: [ainas-front-android]            # backendcpp stays because Android uses CMake cross-compilation
    runs-on: ubuntu-latest
    permissions:
      contents: write

    env:
      NDK_VERSION: "27.2.12479018"
      ANDROID_API: "24"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"

      - uses: android-actions/setup-android@v3

      - name: Install Android NDK
        run: |
          sdkmanager --install "ndk;${{ env.NDK_VERSION }}"

      - name: Install SQLite amalgamation (for Android cross-build)
        run: |
          # Download SQLite amalgamation so we can compile it into the binary
          curl -fsSL https://www.sqlite.org/2024/sqlite-amalgamation-3460100.zip \
            -o sqlite-amal.zip
          unzip -q sqlite-amal.zip
          cp sqlite-amalgamation-*/sqlite3.{c,h} backendcpp/vendor/

      - name: Build backend for arm64-v8a
        run: |
          NDK_PATH="$ANDROID_SDK_ROOT/ndk/${{ env.NDK_VERSION }}"
          TOOLCHAIN="$NDK_PATH/build/cmake/android.toolchain.cmake"
          cmake -S backendcpp -B build-android-arm64 \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_TOOLCHAIN_FILE="$TOOLCHAIN" \
            -DANDROID_ABI=arm64-v8a \
            -DANDROID_PLATFORM=android-${{ env.ANDROID_API }} \
            -DCMAKE_FIND_ROOT_PATH_MODE_LIBRARY=ONLY \
            -DCMAKE_FIND_ROOT_PATH_MODE_INCLUDE=ONLY \
            -DSQLITE3_INCLUDE_DIRS="$GITHUB_WORKSPACE/backendcpp/vendor" \
            -DSQLITE3_LIBRARIES="$GITHUB_WORKSPACE/backendcpp/vendor/sqlite3.c"
          cmake --build build-android-arm64 --parallel --config Release

      - name: Build backend for x86_64
        run: |
          NDK_PATH="$ANDROID_SDK_ROOT/ndk/${{ env.NDK_VERSION }}"
          TOOLCHAIN="$NDK_PATH/build/cmake/android.toolchain.cmake"
          cmake -S backendcpp -B build-android-x86_64 \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_TOOLCHAIN_FILE="$TOOLCHAIN" \
            -DANDROID_ABI=x86_64 \
            -DANDROID_PLATFORM=android-${{ env.ANDROID_API }} \
            -DCMAKE_FIND_ROOT_PATH_MODE_LIBRARY=ONLY \
            -DCMAKE_FIND_ROOT_PATH_MODE_INCLUDE=ONLY \
            -DSQLITE3_INCLUDE_DIRS="$GITHUB_WORKSPACE/backendcpp/vendor" \
            -DSQLITE3_LIBRARIES="$GITHUB_WORKSPACE/backendcpp/vendor/sqlite3.c"
          cmake --build build-android-x86_64 --parallel --config Release

        - name: Download Flutter APK
        uses: actions/download-artifact@v4
        with:
          name: ainas-front-android            # now from 'ainas-front-android' job
          path: dl/android

      - name: Inject backend binaries into APK
        run: |
          # APK is just a zip — we can append assets to it
          APK="dl/android/app-release.apk"
          cp "$APK" ainas-full-android.apk

          # Create the assets/backend/<abi>/ directory structure
          mkdir -p apk-inject/assets/backend/arm64-v8a
          mkdir -p apk-inject/assets/backend/x86_64

          cp build-android-arm64/src/ainas-backend-cpp \
             apk-inject/assets/backend/arm64-v8a/ainas-backend-cpp
          cp build-android-x86_64/src/ainas-backend-cpp \
             apk-inject/assets/backend/x86_64/ainas-backend-cpp

          # Add the files into the APK (zip) — no compression for executables
          cd apk-inject
          zip -0 -r "$GITHUB_WORKSPACE/ainas-full-android.apk" assets/

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: ainas-full-android.apk
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/upload-artifact@v4
        with:
          name: ainas-full-android
          path: ainas-full-android.apk

  # ── iOS full bundle (.app + embedded backend binary) ───────────────
  #
  # The C++ backend is cross-compiled for arm64-apple-ios (device) and
  # placed inside Runner.app so the Flutter app can execute it at
  # runtime from the app bundle's Frameworks or Resources directory.
  # ────────────────────────────────────────────────────────────────────
  ainas-full-ios:
    needs: [ainas-front-ios]              # backendcpp stays because iOS uses CMake cross-compilation
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest

      - name: Install SQLite (via Homebrew for host tools; amalgamation for cross)
        run: |
          curl -fsSL https://www.sqlite.org/2024/sqlite-amalgamation-3460100.zip \
            -o sqlite-amal.zip
          unzip -q sqlite-amal.zip
          cp sqlite-amalgamation-*/sqlite3.{c,h} backendcpp/vendor/

      - name: Build backend for arm64-apple-ios (device)
        run: |
          cmake -S backendcpp -B build-ios-arm64 \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_SYSTEM_NAME=iOS \
            -DCMAKE_OSX_ARCHITECTURES=arm64 \
            -DCMAKE_OSX_DEPLOYMENT_TARGET=16.0 \
            -DCMAKE_OSX_SYSROOT="$(xcrun --sdk iphoneos --show-sdk-path)" \
            -DSQLITE3_INCLUDE_DIRS="$GITHUB_WORKSPACE/backendcpp/vendor" \
            -DSQLITE3_LIBRARIES="$GITHUB_WORKSPACE/backendcpp/vendor/sqlite3.c"
          cmake --build build-ios-arm64 --parallel --config Release

        - name: Download Flutter iOS app
        uses: actions/download-artifact@v4
        with:
          name: ainas-front-ios            # zip containing Runner.app
          path: dl/ios

        - name: Inject backend binary into .app bundle
        run: |
          unzip -q dl/ios/ainas-front-ios.zip -d staging-ios
          APP=$(find staging-ios -maxdepth 1 -name "*.app" | head -1)

          # Place the backend binary alongside the app's main executable
          DEST="$APP/Frameworks"
          mkdir -p "$DEST"
          cp build-ios-arm64/src/ainas-backend-cpp "$DEST/ainas-backend-cpp"
          chmod +x "$DEST/ainas-backend-cpp"

      - name: Create archive
        run: |
          APP=$(find staging-ios -maxdepth 1 -name "*.app" | head -1)
          ditto -c -k --keepParent "$APP" ainas-full-ios.zip

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: ainas-full-ios.zip
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/upload-artifact@v4
        with:
          name: ainas-full-ios
          path: ainas-full-ios.zip
