            bundle/

  # ── Windows installer (.exe) — wraps the full bundle into NSIS ─────
  ainas-full-windows-installer:
    needs: [ainas-full-windows]
    runs-on: windows-latest
    defaults:
      run:
        shell: bash
    permissions:
      contents: write

    steps:
      - name: Download full Windows bundle
        uses: actions/download-artifact@v5
        with:
          name: ainas-full-windows
          path: dl/full

      - name: Extract bundle
        run: |
          mkdir -p bundle
          unzip -q dl/full/ainas-full-windows.zip -d bundle
          # If the zip placed files directly, use them; otherwise use the extracted bundle/
          if [ -d "dl/full/bundle" ]; then
            cp -r dl/full/bundle/* bundle/
          fi

      - name: Install NSIS
        shell: pwsh
        run: choco install nsis -y --no-progress

      - name: Generate Windows installer
        shell: pwsh
        run: |
          $ver = "${{ github.ref_name }}" -replace '^v', ''
          @"
          !define PRODUCT_NAME "AI-NAS"
          !define PRODUCT_VERSION "$ver"
          !define PRODUCT_PUBLISHER "ainas"

          Name "\${PRODUCT_NAME} \${PRODUCT_VERSION}"
          OutFile "${{ github.workspace }}\ainas-full-windows-installer.exe"
          InstallDir "\$PROGRAMFILES64\${PRODUCT_NAME}"
          RequestExecutionLevel admin

          Section "Install"
            SetOutPath "\$INSTDIR"
            File /r "${{ github.workspace }}\bundle\*.*"

            CreateDirectory "\$SMPROGRAMS\${PRODUCT_NAME}"
            CreateShortCut "\$SMPROGRAMS\${PRODUCT_NAME}\AI-NAS.lnk" "\$INSTDIR\ainas_frontend.exe"
            CreateShortCut "\$DESKTOP\AI-NAS.lnk" "\$INSTDIR\ainas_frontend.exe"
          SectionEnd

          Section "Uninstall"
            RMDir /r "\$INSTDIR"
            Delete "\$SMPROGRAMS\${PRODUCT_NAME}\AI-NAS.lnk"
            RMDir "\$SMPROGRAMS\${PRODUCT_NAME}"
            Delete "\$DESKTOP\AI-NAS.lnk"
          SectionEnd
          "@ | Out-File -FilePath installer.nsi -Encoding ASCII
          & "C:\Program Files (x86)\NSIS\makensis.exe" installer.nsi

      - name: Upload installer to Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.ref_name }}
          files: ainas-full-windows-installer.exe
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/upload-artifact@v5
        with:
          name: ainas-full-windows-installer
          path: ainas-full-windows-installer.exe

