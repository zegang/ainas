          $binDir = "$relDir\bin"
          New-Item -ItemType Directory -Force -Path $binDir | Out-Null

          # 1. MSVC CRT from Visual Studio redist
          $redistDir = Get-ChildItem "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\Redist\MSVC" -ErrorAction SilentlyContinue `
            | Sort-Object Name -Descending | Select-Object -First 1
          if ($redistDir) {
            $crtDir = Join-Path $redistDir.FullName "x64\Microsoft.VC143.CRT"
            Copy-Item "$crtDir\*.dll" $relDir -ErrorAction SilentlyContinue
            Copy-Item "$crtDir\*.dll" $binDir -ErrorAction SilentlyContinue
            Write-Host "Copied MSVC DLLs from $crtDir"
          } else {
            Write-Host "MSVC redist not found, trying Windows SDK fallback"
            @("vcruntime140.dll","vcruntime140_1.dll","msvcp140.dll","msvcp140_1.dll","msvcp140_2.dll","concrt140.dll") | ForEach-Object {
              $src = "C:\Windows\System32\$_"
              if (Test-Path $src) {
                Copy-Item $src $relDir -ErrorAction SilentlyContinue
                Copy-Item $src $binDir -ErrorAction SilentlyContinue
              }
            }
          }

          # 2. Optional vcpkg DLLs if the build found them
          $vcpkgBin = "C:\vcpkg\installed\x64-windows\bin"
          if (Test-Path $vcpkgBin) {
            @("libssl-3*.dll","libcrypto-3*.dll","zlib*.dll","libbrotli*.dll","libgomp*.dll") | ForEach-Object {
              Copy-Item (Join-Path $vcpkgBin $_) $relDir -ErrorAction SilentlyContinue
              Copy-Item (Join-Path $vcpkgBin $_) $binDir -ErrorAction SilentlyContinue
            }
            Write-Host "Checked vcpkg bin ($vcpkgBin) for additional DLLs"
          }

      - name: Package binary
        run: |
          REL=backendcpp/build/src/Release
          mkdir -p staging/bin
          cp "$REL"/ainas-backend-cpp.exe staging/
          if [ -f "$REL/bin/cllama.exe" ]; then
            cp "$REL"/bin/cllama.exe staging/bin/
            cp "$REL"/bin/cllama_runner.exe staging/bin/
          else
            find backendcpp/build/cllama -name "cllama.exe" -exec cp {} staging/bin/ \; 2>/dev/null || :
            find backendcpp/build/cllama -name "cllama_runner.exe" -exec cp {} staging/bin/ \; 2>/dev/null || :
            echo "cllama binaries: searched from ExternalProject build tree"
          fi
          cp "$REL"/*.dll staging/ 2>/dev/null || true
          cp "$REL"/bin/*.dll staging/bin/ 2>/dev/null || true
          tar czf ainas-backendcpp-windows7.tar.gz -C staging .
          rm -rf staging

      - uses: actions/upload-artifact@v5
        with:
          name: ainas-backendcpp-windows7
          path: ainas-backendcpp-windows7.tar.gz

  # ─── Full bundles: Flutter frontend + C++ backend ──────────────────
  ainas-full-linux:
    needs: [ainas-frontend-linux, ainas-backendcpp-linux]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v5
        with:
