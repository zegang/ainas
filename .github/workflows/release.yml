name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  # ─── GitHub Pages — deploy docs before builds start ──────────────
  docs:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v5

      - name: Deploy docs to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs
          destination_dir: .
          keep_files: false
          publish_branch: gh-pages

  # ─── Flutter Web build (shared by all backend Docker variants) ─────
  ainas-frontend-web:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v5

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.44.3"
          channel: stable

      - working-directory: frontend
        run: |
          if [[ ! -d "web" ]]; then
            flutter create --platforms web .
          fi
          flutter pub get

      - name: Build web (release)
        working-directory: frontend
        run: flutter build web --release

      - name: Create web archive
        run: tar czf ainas-web.tar.gz -C frontend/build/web .

      - name: Upload to Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.ref_name }}
          files: ainas-web.tar.gz
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/upload-artifact@v5
        with:
          name: ainas-frontend-web
          path: frontend/build/web

  # ─── Backend Docker images: CPU ────────────────────────────────
  backend-image-cpu:
    needs: ainas-frontend-web
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v5

      - uses: actions/download-artifact@v5
        with:
          name: ainas-frontend-web
          path: frontend/build/web

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate tags
        id: tags
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository }}/backend
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: backend/containerize/Dockerfile
          push: true
          build-args: |
            BASE_IMAGE=python:3.12-slim
            BUILDER_BASE_IMAGE=python:3.12-slim
            TORCH_INDEX_URL=""
            LLAMA_CPP_CMAKE_ARGS=""
          tags: ${{ steps.tags.outputs.tags }}
          labels: ${{ steps.tags.outputs.labels }}

  # ─── Backend Docker images: CUDA ───────────────────────────────
  backend-image-cuda:
    needs: ainas-frontend-web
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v5

      - uses: actions/download-artifact@v5
        with:
          name: ainas-frontend-web
          path: frontend/build/web

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate tags
        id: tags
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository }}/backend
          tags: |
            type=semver,pattern={{version}}-cuda
            type=semver,pattern={{major}}.{{minor}}-cuda
            type=raw,value=latest-cuda,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: backend/containerize/Dockerfile
          push: true
          build-args: |
            BASE_IMAGE=nvidia/cuda:12.4.1-runtime-ubuntu22.04
            BUILDER_BASE_IMAGE=nvidia/cuda:12.4.1-devel-ubuntu22.04
            TORCH_INDEX_URL=https://download.pytorch.org/whl/cu124
            LLAMA_CPP_CMAKE_ARGS=-DGGML_CUDA=ON
          tags: ${{ steps.tags.outputs.tags }}
          labels: ${{ steps.tags.outputs.labels }}

  # ─── Backend Docker images: ROCm ───────────────────────────────
  backend-image-rocm:
    needs: ainas-frontend-web
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v5

      - uses: actions/download-artifact@v5
        with:
          name: ainas-frontend-web
          path: frontend/build/web

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate tags
        id: tags
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository }}/backend
          tags: |
            type=semver,pattern={{version}}-rocm
            type=semver,pattern={{major}}.{{minor}}-rocm
            type=raw,value=latest-rocm,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: backend/containerize/Dockerfile
          push: true
          build-args: |
            BASE_IMAGE=rocm/pytorch:rocm7.2.4_ubuntu24.04_py3.12_pytorch_release_2.10.0
            BUILDER_BASE_IMAGE=rocm/pytorch:rocm7.2.4_ubuntu24.04_py3.12_pytorch_release_2.10.0
            TORCH_INDEX_URL=https://download.pytorch.org/whl/rocm7.2
            LLAMA_CPP_CMAKE_ARGS=-DGGML_HIPBLAS=ON
          tags: ${{ steps.tags.outputs.tags }}
          labels: ${{ steps.tags.outputs.labels }}

  # ─── Android APK ───────────────────────────────────────────────────
  ainas-frontend-android:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v5

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.44.3"
          channel: stable

      - uses: actions/setup-java@v5
        with:
          java-version: "21"
          distribution: "temurin"

      - uses: android-actions/setup-android@v4

      - working-directory: frontend
        run: |
          if [[ ! -d "android" ]]; then
            flutter create --platforms android .
          fi
          flutter pub get

      - name: Patch isar_flutter_libs compileSdkVersion (pub-cache workaround)
        run: |
          PUB_CACHE_DIR="${PUB_CACHE:-$HOME/.pub-cache}"
          ISAR_DIR="$PUB_CACHE_DIR/hosted/pub.dev/isar_flutter_libs-*/android"
          for f in $ISAR_DIR/build.gradle $ISAR_DIR/build.gradle.kts; do
            if [ -f "$f" ]; then
              echo "Patching $f"
              sed -i 's/compileSdkVersion [0-9]\+/compileSdkVersion 34/' "$f"
              sed -i 's/compileSdk = [0-9]\+/compileSdk = 34/' "$f"
            fi
          done
          # Also patch the AndroidManifest package attribute workaround
          for f in "$PUB_CACHE_DIR"/hosted/pub.dev/isar_flutter_libs-*/android/src/main/AndroidManifest.xml; do
            if [ -f "$f" ]; then
              echo "Patching $f"
              sed -i 's/ package="[^"]*"//g' "$f" || true
            fi
          done

      - name: Build APK
        working-directory: frontend
        run: flutter build apk --release --android-skip-build-dependency-validation

      - name: Rename APK
        run: cp frontend/build/app/outputs/flutter-apk/app-release.apk ainas-frontend-android.apk

      - name: Upload to Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.ref_name }}
          files: ainas-frontend-android.apk
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/upload-artifact@v5
        with:
          name: ainas-frontend-android
          path: frontend/build/app/outputs/flutter-apk/app-release.apk

  # ─── iOS (unsigned archive) ────────────────────────────────────────
  ainas-frontend-ios:
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v5

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.44.3"
          channel: stable

      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest

      - working-directory: frontend
        run: |
          if [[ ! -d "ios" ]]; then
            flutter create --platforms ios .
          fi
          # Bump iOS min version to 14.0 for file-picker Swift Package plugin
          sed -i '' 's/platform :ios, '\''13.0'\''/platform :ios, '\''14.0'\''/' ios/Podfile
          # Also bump the deployment target in AppFrameworkInfo.plist so Xcode
          # target matches what SPM plugins require
          sed -i '' 's|<string>13.0</string>|<string>14.0</string>|' ios/Flutter/AppFrameworkInfo.plist 2>/dev/null || true
          flutter pub get

      - name: Ensure iOS minimum deployment target 14.0
        working-directory: frontend
        run: |
          # Flutter generates the Xcode project during build; patch the
          # IPHONEOS_DEPLOYMENT_TARGET in pbxproj so SPM plugin integrity
          # checks pass.
          sed -i '' 's/IPHONEOS_DEPLOYMENT_TARGET = 13.0;/IPHONEOS_DEPLOYMENT_TARGET = 14.0;/' \
            ios/Runner.xcodeproj/project.pbxproj 2>/dev/null || true
          # Ensure Podfile is still at 14.0 (flutter pub get may have reverted it)
          sed -i '' 's/platform :ios, '\''13.0'\''/platform :ios, '\''14.0'\''/' ios/Podfile 2>/dev/null || true
          # Also ensure the AppFrameworkInfo.plist stays at 14.0
          sed -i '' 's|<string>13.0</string>|<string>14.0</string>|' ios/Flutter/AppFrameworkInfo.plist 2>/dev/null || true

      - name: Build iOS (no codesign)
        working-directory: frontend
        run: flutter build ios --release --no-codesign

      - name: Archive .app
        run: ditto -c -k --keepParent frontend/build/ios/iphoneos/Runner.app ainas-frontend-ios.zip

      - name: Upload to Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.ref_name }}
          files: ainas-frontend-ios.zip
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/upload-artifact@v5
        with:
          name: ainas-frontend-ios
          path: ainas-frontend-ios.zip

  # ─── macOS ─────────────────────────────────────────────────────────
  ainas-frontend-macos:
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v5

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.44.3"
          channel: stable

      - working-directory: frontend
        run: |
          if [[ ! -d "macos" ]]; then
            flutter create --platforms macos .
          fi
          flutter pub get

      - name: Build macOS
        working-directory: frontend
        run: flutter build macos --release

      - name: Archive .app
        run: ditto -c -k --keepParent frontend/build/macos/Build/Products/Release/ainas_frontend.app ainas-frontend-macos.zip

      - name: Upload to Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.ref_name }}
          files: ainas-frontend-macos.zip
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/upload-artifact@v5
        with:
          name: ainas-frontend-macos
          path: ainas-frontend-macos.zip

  # ─── Linux ─────────────────────────────────────────────────────────
  ainas-frontend-linux:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v5

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.44.3"
          channel: stable

      - name: Install Linux build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build pkg-config \
            libgtk-3-dev liblzma-dev libstdc++-12-dev \
            libayatana-appindicator3-dev libboost-all-dev

      - working-directory: frontend
        run: |
          if [[ ! -d "linux" ]]; then
            flutter create --platforms linux .
          fi
          flutter pub get

      - name: Build Linux
        working-directory: frontend
        run: flutter build linux --release

      - name: Add run.sh wrapper
        run: cp frontend/linux/run.sh frontend/build/linux/x64/release/bundle/run.sh

      - name: Create tar.gz
        run: tar czf ainas-frontend-linux.tar.gz -C frontend/build/linux/x64/release/bundle .

      - name: Upload to Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.ref_name }}
          files: ainas-frontend-linux.tar.gz
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/upload-artifact@v5
        with:
          name: ainas-frontend-linux
          path: ainas-frontend-linux.tar.gz

  # ─── Windows ───────────────────────────────────────────────────────
  ainas-frontend-windows:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v5

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.44.3"
          channel: stable

      - working-directory: frontend
        shell: bash
        run: |
          if [[ ! -d "windows" ]]; then
            flutter create --platforms windows .
          fi
          flutter pub get

      - name: Build Windows
        working-directory: frontend
        run: flutter build windows --release

      - name: Bundle MSVC runtime DLLs
        shell: pwsh
        run: |
          $outDir = "${{ github.workspace }}\frontend\build\windows\x64\runner\Release"
          $redistDir = Get-ChildItem "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\Redist\MSVC" -ErrorAction SilentlyContinue `
            | Sort-Object Name -Descending | Select-Object -First 1
          if ($redistDir) {
            $crtDir = Join-Path $redistDir.FullName "x64\Microsoft.VC143.CRT"
            Copy-Item "$crtDir\*.dll" $outDir -ErrorAction SilentlyContinue
            Write-Host "Copied MSVC DLLs from $crtDir to $outDir"
          } else {
            Write-Host "MSVC redist directory not found, skipping DLL copy"
          }

      - name: Create zip
        working-directory: frontend\build\windows\x64\runner\Release
        run: |
          Compress-Archive -Path * -DestinationPath ${{ github.workspace }}/ainas-frontend-windows.zip

      - name: Upload to Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.ref_name }}
          files: ainas-frontend-windows.zip
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/upload-artifact@v5
        with:
           name: ainas-frontend-windows
           path: ainas-frontend-windows.zip

  # ─── Windows (Win7 target) ──────────────────────────────────────────
  ainas-frontend-windows7:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v5

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.44.3"
          channel: stable

      - name: Pin Win7 target in CMakeLists.txt
        working-directory: frontend
        shell: bash
        run: |
          sed -i 's/set(TARGET_WINDOWS_VER "[^"]*"/set(TARGET_WINDOWS_VER "0x0601"/' \
            windows/CMakeLists.txt

      - working-directory: frontend
        shell: bash
        run: |
          if [[ ! -d "windows" ]]; then
            flutter create --platforms windows .
          fi
          flutter pub get

      - name: Build Windows (Win7 target)
        working-directory: frontend
        run: flutter build windows --release

      - name: Bundle MSVC runtime DLLs
        shell: pwsh
        run: |
          $outDir = "${{ github.workspace }}\frontend\build\windows\x64\runner\Release"
          $redistDir = Get-ChildItem "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\Redist\MSVC" -ErrorAction SilentlyContinue `
            | Sort-Object Name -Descending | Select-Object -First 1
          if ($redistDir) {
            $crtDir = Join-Path $redistDir.FullName "x64\Microsoft.VC143.CRT"
            Copy-Item "$crtDir\*.dll" $outDir -ErrorAction SilentlyContinue
            Write-Host "Copied MSVC DLLs from $crtDir to $outDir"
          } else {
            Write-Host "MSVC redist directory not found, skipping DLL copy"
          }

      - name: Create zip
        working-directory: frontend\build\windows\x64\runner\Release
        run: |
          Compress-Archive -Path * -DestinationPath ${{ github.workspace }}/ainas-frontend-windows7.zip

      - name: Upload to Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.ref_name }}
          files: ainas-frontend-windows7.zip
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/upload-artifact@v5
        with:
          name: ainas-frontend-windows7
          path: ainas-frontend-windows7.zip

  # ─── C++ Backend: Linux ─────────────────────────────────────────────
  ainas-backendcpp-linux:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Deinit unused cpprestsdk submodule
        run: git -C vendor/cllama submodule deinit -f third_party/cpprestsdk 2>/dev/null || true

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libavahi-compat-libdnssd-dev libpoppler-cpp-dev libqpdf-dev libboost-all-dev

      - name: Configure CMake
        working-directory: backendcpp
        run: |
          mkdir -p build
          cmake -S . -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        working-directory: backendcpp
        run: cmake --build build --parallel 2 --config Release

      - name: Bundle runtime libraries & package binary
        run: |
          # Install patchelf for rpath manipulation
          sudo apt-get install -y -qq patchelf

          # Stage binaries
          mkdir -p staging/lib staging/bin
          cp backendcpp/build/src/ainas-backend-cpp staging/
          cp backendcpp/build/src/bin/cllama staging/bin/
          cp backendcpp/build/src/bin/cllama_runner staging/bin/
          chmod +x staging/bin/cllama staging/bin/cllama_runner

          # Collect all non-system shared library dependencies
          for bin in ainas-backend-cpp bin/cllama bin/cllama_runner; do
            ldd "staging/$bin" 2>/dev/null | awk '/=> \/.*\.so/ {print $3}' >> /tmp/deps.txt
          done
          sort -u /tmp/deps.txt | while read lib; do
            name=$(basename "$lib")
            case "$name" in
              ld-linux-*|libc.so*|libm.so*|libpthread.so*|libdl.so*|librt.so*|libstdc++.so*|libgcc_s.so*|linux-vdso*)
                continue ;;
            esac
            cp -n "$lib" staging/lib/ 2>/dev/null || true
          done

          # Set rpath on all binaries so they find bundled libs
          for bin in ainas-backend-cpp bin/cllama bin/cllama_runner; do
            patchelf --set-rpath '$ORIGIN/lib' "staging/$bin" 2>/dev/null || true
          done

          tar czf ainas-backendcpp-linux.tar.gz -C staging .

      - name: Upload to Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.ref_name }}
          files: ainas-backendcpp-linux.tar.gz
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/upload-artifact@v5
        with:
          name: ainas-backendcpp-linux
          path: ainas-backendcpp-linux.tar.gz

  # ─── C++ Backend: macOS ──────────────────────────────────────────────
  ainas-backendcpp-macos:
    runs-on: macos-latest
    defaults:
      run:
        shell: bash
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Deinit unused cpprestsdk submodule
        run: git -C vendor/cllama submodule deinit -f third_party/cpprestsdk 2>/dev/null || true

      - name: Install PDF dependencies
        run: brew install poppler qpdf boost

      - name: Configure CMake
        working-directory: backendcpp
        run: |
          mkdir -p build
          cmake -S . -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        working-directory: backendcpp
        run: cmake --build build --parallel --config Release

      - name: Bundle runtime libraries & package binary
        run: |
          # Stage binaries
          mkdir -p staging/lib staging/bin
          cp backendcpp/build/src/ainas-backend-cpp staging/
          cp backendcpp/build/src/bin/cllama staging/bin/
          cp backendcpp/build/src/bin/cllama_runner staging/bin/
          chmod +x staging/bin/cllama staging/bin/cllama_runner

          # Collect non-system shared library dependencies
          for bin in ainas-backend-cpp bin/cllama bin/cllama_runner; do
            otool -L "staging/$bin" 2>/dev/null | \
              grep -v ':' | grep -v '/usr/lib/' | grep -v '/System/' | \
              grep -v 'libstdc++' | grep -v 'libgcc_s' | grep -v 'libc++' | \
              awk '!/@rpath|@executable_path|@loader_path/ {print $1}' >> /tmp/deps.txt
          done
          sort -u /tmp/deps.txt | while read lib; do
            [ -z "$lib" ] && continue
            cp -n "$lib" staging/lib/ 2>/dev/null || true
          done

          # Add rpath so binaries find bundled libs
          for bin in ainas-backend-cpp bin/cllama bin/cllama_runner; do
            install_name_tool -add_rpath '@executable_path/../lib' "staging/$bin" 2>/dev/null || true
          done
          # Fix library identification names for bundled dylibs
          for lib in staging/lib/*.dylib; do
            [ -f "$lib" ] && install_name_tool -id "@rpath/$(basename $lib)" "$lib" 2>/dev/null || true
          done

          tar czf ainas-backendcpp-macos.tar.gz -C staging .

      - name: Upload to Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.ref_name }}
          files: ainas-backendcpp-macos.tar.gz
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/upload-artifact@v5
        with:
          name: ainas-backendcpp-macos
          path: ainas-backendcpp-macos.tar.gz

  # ─── C++ Backend: Windows ───────────────────────────────────────────
  ainas-backendcpp-windows:
    runs-on: windows-latest
    defaults:
      run:
        shell: bash
    permissions:
      contents: write

    steps:
      # Fix 1: Recursive submodules so vendor/cllama/third_party/* is also checked out
      - uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Deinit unused cpprestsdk submodule
        run: git -C vendor/cllama submodule deinit -f third_party/cpprestsdk 2>/dev/null || true

      # Fix 2: Install PDF dependencies via vcpkg
      - name: Install PDF & Boost dependencies (vcpkg)
        continue-on-error: true
        run: |
          vcpkg install poppler qpdf boost-system boost-date-time boost-regex --triplet x64-windows
          echo "CMAKE_PREFIX_PATH=C:\vcpkg\installed\x64-windows" >> $GITHUB_ENV
          echo "CLLAMA_CMAKE_TOOLCHAIN_FILE=C:\vcpkg\scripts\buildsystems\vcpkg.cmake" >> $GITHUB_ENV

      # Fix 3: Download and drop SQLite amalgamation source into vendor
      - name: Install SQLite amalgamation
        run: |
          curl -fsSL https://www.sqlite.org/2024/sqlite-amalgamation-3460100.zip \
            -o sqlite-amal.zip
          unzip -q sqlite-amal.zip
          cp sqlite-amalgamation-*/sqlite3.{c,h} backendcpp/vendor/

      # Fix 4: Direct CMake to treat the amalgamation files as the source library
      - name: Configure CMake
        working-directory: backendcpp
        run: |
          mkdir -p build
          cmake -S . -B build -DCMAKE_BUILD_TYPE=Release \
            -DSQLITE3_INCLUDE_DIRS="$GITHUB_WORKSPACE/backendcpp/vendor" \
            -DSQLITE3_LIBRARIES="$GITHUB_WORKSPACE/backendcpp/vendor/sqlite3.c"

      - name: Build
        working-directory: backendcpp
        run: cmake --build build --parallel --config Release

      - name: Bundle runtime DLLs (MSVC, vcpkg, etc.)
        shell: pwsh
        run: |
          $relDir = "backendcpp\build\src\Release"
          $binDir = "$relDir\bin"
          New-Item -ItemType Directory -Force -Path $binDir | Out-Null

          # 1. MSVC CRT from Visual Studio redist
          $redistDir = Get-ChildItem "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\Redist\MSVC" -ErrorAction SilentlyContinue `
            | Sort-Object Name -Descending | Select-Object -First 1
          if ($redistDir) {
            $crtDir = Join-Path $redistDir.FullName "x64\Microsoft.VC143.CRT"
            Copy-Item "$crtDir\*.dll" $relDir -ErrorAction SilentlyContinue
            Copy-Item "$crtDir\*.dll" $binDir -ErrorAction SilentlyContinue
            Write-Host "Copied MSVC DLLs from $crtDir"
          } else {
            Write-Host "MSVC redist not found, trying Windows SDK fallback"
            # Fallback: copy from C:\Windows\System32 (likely present on any Windows)
            @("vcruntime140.dll","vcruntime140_1.dll","msvcp140.dll","msvcp140_1.dll","msvcp140_2.dll","concrt140.dll") | ForEach-Object {
              $src = "C:\Windows\System32\$_"
              if (Test-Path $src) {
                Copy-Item $src $relDir -ErrorAction SilentlyContinue
                Copy-Item $src $binDir -ErrorAction SilentlyContinue
              }
            }
          }

          # 2. Optional vcpkg DLLs (libssl, libcrypto, zlib, brotli) if the build found them
          $vcpkgBin = "C:\vcpkg\installed\x64-windows\bin"
          if (Test-Path $vcpkgBin) {
            @("libssl-3*.dll","libcrypto-3*.dll","zlib*.dll","libbrotli*.dll","libgomp*.dll") | ForEach-Object {
              Copy-Item (Join-Path $vcpkgBin $_) $relDir -ErrorAction SilentlyContinue
              Copy-Item (Join-Path $vcpkgBin $_) $binDir -ErrorAction SilentlyContinue
            }
            Write-Host "Checked vcpkg bin ($vcpkgBin) for additional DLLs"
          }

      - name: Package binary
        run: |
          REL=backendcpp/build/src/Release
          mkdir -p staging/bin
          cp "$REL"/ainas-backend-cpp.exe staging/
          # cllama binaries: try expected location first, then find from
          # ExternalProject build dir (multi-config generators put outputs
          # under a $<CONFIG>/ subdirectory).
          if [ -f "$REL/bin/cllama.exe" ]; then
            cp "$REL"/bin/cllama.exe staging/bin/
            cp "$REL"/bin/cllama_runner.exe staging/bin/
          else
            # Find cllama.exe anywhere under the cllama build tree
            find backendcpp/build/cllama -name "cllama.exe" -exec cp {} staging/bin/ \; 2>/dev/null || :
            find backendcpp/build/cllama -name "cllama_runner.exe" -exec cp {} staging/bin/ \; 2>/dev/null || :
            echo "cllama binaries: searched from ExternalProject build tree"
          fi
          cp "$REL"/*.dll staging/ 2>/dev/null || true
          cp "$REL"/bin/*.dll staging/bin/ 2>/dev/null || true
          tar czf ainas-backendcpp-windows.tar.gz -C staging .
          rm -rf staging

      - name: Upload to Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.ref_name }}
          files: ainas-backendcpp-windows.tar.gz
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/upload-artifact@v5
        with:
           name: ainas-backendcpp-windows
           path: ainas-backendcpp-windows.tar.gz

  # ─── C++ Backend: Windows (Win7) ────────────────────────────────────
  ainas-backendcpp-windows7:
