  # ── Android full bundle (APK + embedded backend binaries) ──────────
  ainas-full-android:
    needs: [ainas-frontend-android]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    env:
      NDK_VERSION: "27.2.12479018"
      ANDROID_API: "24"

    steps:
      - uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Deinit unused cpprestsdk submodule
        run: git -C vendor/cllama submodule deinit -f third_party/cpprestsdk 2>/dev/null || true

      - uses: actions/setup-java@v5
        with:
          java-version: "21"
          distribution: "temurin"

      - uses: android-actions/setup-android@v4

      - name: Install Android NDK
        run: |
          sdkmanager --install "ndk;${{ env.NDK_VERSION }}"

      - name: Install Boost (required by cllama/cpprestsdk)
        run: |
          sudo apt-get update && sudo apt-get install -y libboost-all-dev

      - name: Install SQLite amalgamation (for Android cross-build)
        run: |
          curl -fsSL https://www.sqlite.org/2024/sqlite-amalgamation-3460100.zip \
            -o sqlite-amal.zip
          unzip -q sqlite-amal.zip
          cp sqlite-amalgamation-*/sqlite3.{c,h} backendcpp/vendor/

      - name: Build backend for arm64-v8a
        run: |
          NDK_PATH="$ANDROID_SDK_ROOT/ndk/${{ env.NDK_VERSION }}"
          TOOLCHAIN="$NDK_PATH/build/cmake/android.toolchain.cmake"
          cmake -S backendcpp -B build-android-arm64 \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_TOOLCHAIN_FILE="$TOOLCHAIN" \
            -DANDROID_ABI=arm64-v8a \
            -DANDROID_PLATFORM=android-${{ env.ANDROID_API }} \
            -DCMAKE_FIND_ROOT_PATH_MODE_LIBRARY=ONLY \
            -DCMAKE_FIND_ROOT_PATH_MODE_INCLUDE=ONLY \
            -DSQLITE3_INCLUDE_DIRS="$GITHUB_WORKSPACE/backendcpp/vendor" \
            -DSQLITE3_LIBRARIES="$GITHUB_WORKSPACE/backendcpp/vendor/sqlite3.c"
          cmake --build build-android-arm64 --parallel --config Release

      - name: Build backend for x86_64
        run: |
          NDK_PATH="$ANDROID_SDK_ROOT/ndk/${{ env.NDK_VERSION }}"
          TOOLCHAIN="$NDK_PATH/build/cmake/android.toolchain.cmake"
          cmake -S backendcpp -B build-android-x86_64 \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_TOOLCHAIN_FILE="$TOOLCHAIN" \
            -DANDROID_ABI=x86_64 \
            -DANDROID_PLATFORM=android-${{ env.ANDROID_API }} \
            -DCMAKE_FIND_ROOT_PATH_MODE_LIBRARY=ONLY \
            -DCMAKE_FIND_ROOT_PATH_MODE_INCLUDE=ONLY \
            -DSQLITE3_INCLUDE_DIRS="$GITHUB_WORKSPACE/backendcpp/vendor" \
            -DSQLITE3_LIBRARIES="$GITHUB_WORKSPACE/backendcpp/vendor/sqlite3.c"
          cmake --build build-android-x86_64 --parallel --config Release

      - name: Download Flutter APK
        uses: actions/download-artifact@v5
        with:
          name: ainas-frontend-android
          path: dl/android

      - name: Inject backend binaries into APK
        run: |
          APK="dl/android/app-release.apk"
          cp "$APK" ainas-full-android.apk

          mkdir -p apk-inject/assets/backend/arm64-v8a
          mkdir -p apk-inject/assets/backend/x86_64

          cp build-android-arm64/src/ainas-backend-cpp \
             apk-inject/assets/backend/arm64-v8a/ainas-backend-cpp
          cp build-android-x86_64/src/ainas-backend-cpp \
             apk-inject/assets/backend/x86_64/ainas-backend-cpp

          cd apk-inject
          zip -0 -r "$GITHUB_WORKSPACE/ainas-full-android.apk" assets/

      - name: Upload to Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.ref_name }}
          files: ainas-full-android.apk
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/upload-artifact@v5
        with:
          name: ainas-full-android
          path: ainas-full-android.apk

  # ── iOS full bundle (.app + embedded backend binary) ───────────────
  ainas-full-ios:
    needs: [ainas-frontend-ios]
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Deinit unused cpprestsdk submodule
        run: git -C vendor/cllama submodule deinit -f third_party/cpprestsdk 2>/dev/null || true

      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest

      - name: Install SQLite (via Homebrew for host tools; amalgamation for cross)
        run: |
          curl -fsSL https://www.sqlite.org/2024/sqlite-amalgamation-3460100.zip \
            -o sqlite-amal.zip
          unzip -q sqlite-amal.zip
          cp sqlite-amalgamation-*/sqlite3.{c,h} backendcpp/vendor/

      - name: Build backend for arm64-apple-ios (device)
        run: |
          cmake -S backendcpp -B build-ios-arm64 \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_SYSTEM_NAME=iOS \
            -DCMAKE_OSX_ARCHITECTURES=arm64 \
            -DCMAKE_OSX_DEPLOYMENT_TARGET=16.0 \
            -DCMAKE_OSX_SYSROOT="$(xcrun --sdk iphoneos --show-sdk-path)" \
            -DSQLITE3_INCLUDE_DIRS="$GITHUB_WORKSPACE/backendcpp/vendor" \
            -DSQLITE3_LIBRARIES="$GITHUB_WORKSPACE/backendcpp/vendor/sqlite3.c"
          cmake --build build-ios-arm64 --parallel --config Release

      - name: Download Flutter iOS app
        uses: actions/download-artifact@v5
        with:
          name: ainas-frontend-ios
          path: dl/ios

      - name: Inject backend binary into .app bundle
        run: |
          unzip -q dl/ios/ainas-frontend-ios.zip -d staging-ios
          APP=$(find staging-ios -maxdepth 1 -name "*.app" | head -1)

          DEST="$APP/Frameworks"
          mkdir -p "$DEST"
          cp build-ios-arm64/src/ainas-backend-cpp "$DEST/ainas-backend-cpp"
          chmod +x "$DEST/ainas-backend-cpp"

      - name: Create archive
        run: |
          APP=$(find staging-ios -maxdepth 1 -name "*.app" | head -1)
          ditto -c -k --keepParent "$APP" ainas-full-ios.zip

      - name: Upload to Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.ref_name }}
          files: ainas-full-ios.zip
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/upload-artifact@v5
        with:
          name: ainas-full-ios
          path: ainas-full-ios.zip