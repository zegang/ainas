name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  # ─── GitHub Pages — deploy docs before builds start ──────────────
  docs:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v5

      - name: Deploy docs to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs
          destination_dir: .
          keep_files: false
          publish_branch: gh-pages

  # ─── Flutter Web build (shared by all backend Docker variants) ─────
  ainas-frontend-web:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v5

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.44.3"
          channel: stable

      - working-directory: frontend
        run: |
          if [[ ! -d "web" ]]; then
            flutter create --platforms web .
          fi
          flutter pub get

      - name: Build web (release)
        working-directory: frontend
        run: flutter build web --release

      - name: Create web archive
        run: tar czf ainas-web.tar.gz -C frontend/build/web .

      - name: Upload to Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.ref_name }}
          files: ainas-web.tar.gz
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/upload-artifact@v5
        with:
          name: ainas-frontend-web
          path: frontend/build/web

  # ─── Backend Docker images: CPU ────────────────────────────────
  backend-image-cpu:
    needs: ainas-frontend-web
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v5

      - uses: actions/download-artifact@v5
        with:
          name: ainas-frontend-web
          path: frontend/build/web

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate tags
        id: tags
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository }}/backend
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: backend/containerize/Dockerfile
          push: true
          build-args: |
            BASE_IMAGE=python:3.12-slim
            BUILDER_BASE_IMAGE=python:3.12-slim
            TORCH_INDEX_URL=""
            LLAMA_CPP_CMAKE_ARGS=""
          tags: ${{ steps.tags.outputs.tags }}
          labels: ${{ steps.tags.outputs.labels }}

  # ─── Backend Docker images: CUDA ───────────────────────────────
  backend-image-cuda:
    needs: ainas-frontend-web
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v5

      - uses: actions/download-artifact@v5
        with:
          name: ainas-frontend-web
          path: frontend/build/web

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate tags
        id: tags
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository }}/backend
          tags: |
            type=semver,pattern={{version}}-cuda
            type=semver,pattern={{major}}.{{minor}}-cuda
            type=raw,value=latest-cuda,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: backend/containerize/Dockerfile
          push: true
          build-args: |
            BASE_IMAGE=nvidia/cuda:12.4.1-runtime-ubuntu22.04
            BUILDER_BASE_IMAGE=nvidia/cuda:12.4.1-devel-ubuntu22.04
            TORCH_INDEX_URL=https://download.pytorch.org/whl/cu124
            LLAMA_CPP_CMAKE_ARGS=-DGGML_CUDA=ON
          tags: ${{ steps.tags.outputs.tags }}
          labels: ${{ steps.tags.outputs.labels }}

  # ─── Backend Docker images: ROCm ───────────────────────────────
  backend-image-rocm:
    needs: ainas-frontend-web
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v5

      - uses: actions/download-artifact@v5
        with:
          name: ainas-frontend-web
          path: frontend/build/web

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate tags
        id: tags
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository }}/backend
          tags: |
            type=semver,pattern={{version}}-rocm
            type=semver,pattern={{major}}.{{minor}}-rocm
            type=raw,value=latest-rocm,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: backend/containerize/Dockerfile
          push: true
          build-args: |
            BASE_IMAGE=rocm/pytorch:rocm7.2.4_ubuntu24.04_py3.12_pytorch_release_2.10.0
            BUILDER_BASE_IMAGE=rocm/pytorch:rocm7.2.4_ubuntu24.04_py3.12_pytorch_release_2.10.0
            TORCH_INDEX_URL=https://download.pytorch.org/whl/rocm7.2
            LLAMA_CPP_CMAKE_ARGS=-DGGML_HIPBLAS=ON
          tags: ${{ steps.tags.outputs.tags }}
          labels: ${{ steps.tags.outputs.labels }}

  # ─── Android APK ───────────────────────────────────────────────────
  ainas-frontend-android:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v5

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.44.3"
          channel: stable

      - uses: actions/setup-java@v5
        with:
          java-version: "21"
          distribution: "temurin"

      - uses: android-actions/setup-android@v4

      - working-directory: frontend
        run: |
          if [[ ! -d "android" ]]; then
            flutter create --platforms android .
          fi
          flutter pub get

      - name: Build APK
        working-directory: frontend
        run: flutter build apk --release --android-skip-build-dependency-validation

      - name: Rename APK
        run: cp frontend/build/app/outputs/flutter-apk/app-release.apk ainas-frontend-android.apk

      - name: Upload to Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.ref_name }}
          files: ainas-frontend-android.apk
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/upload-artifact@v5
        with:
          name: ainas-frontend-android
          path: frontend/build/app/outputs/flutter-apk/app-release.apk

  # ─── iOS (unsigned archive) ────────────────────────────────────────
  ainas-frontend-ios:
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v5

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.44.3"
          channel: stable

      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest

      - working-directory: frontend
        run: |
          if [[ ! -d "ios" ]]; then
            flutter create --platforms ios .
          fi
          flutter pub get

      - name: Build iOS (no codesign)
        working-directory: frontend
        run: flutter build ios --release --no-codesign

      - name: Archive .app
        run: ditto -c -k --keepParent frontend/build/ios/iphoneos/Runner.app ainas-frontend-ios.zip

      - name: Upload to Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.ref_name }}
          files: ainas-frontend-ios.zip
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/upload-artifact@v5
        with:
          name: ainas-frontend-ios
          path: ainas-frontend-ios.zip

  # ─── macOS ─────────────────────────────────────────────────────────
  ainas-frontend-macos:
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v5

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.44.3"
          channel: stable

      - working-directory: frontend
        run: |
          if [[ ! -d "macos" ]]; then
            flutter create --platforms macos .
          fi
          flutter pub get

      - name: Build macOS
        working-directory: frontend
        run: flutter build macos --release

      - name: Archive .app
        run: ditto -c -k --keepParent frontend/build/macos/Build/Products/Release/Runner.app ainas-frontend-macos.zip

      - name: Upload to Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.ref_name }}
          files: ainas-frontend-macos.zip
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/upload-artifact@v5
        with:
          name: ainas-frontend-macos
          path: ainas-frontend-macos.zip

  # ─── Linux ─────────────────────────────────────────────────────────
  ainas-frontend-linux:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v5

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.44.3"
          channel: stable

      - name: Install Linux build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build pkg-config \
            libgtk-3-dev liblzma-dev libstdc++-12-dev \
            libayatana-appindicator3-dev

      - working-directory: frontend
        run: |
          if [[ ! -d "linux" ]]; then
            flutter create --platforms linux .
          fi
          flutter pub get

      - name: Build Linux
        working-directory: frontend
        run: flutter build linux --release

      - name: Add run.sh wrapper
        run: cp frontend/linux/run.sh frontend/build/linux/x64/release/bundle/run.sh

      - name: Create tar.gz
        run: tar czf ainas-frontend-linux.tar.gz -C frontend/build/linux/x64/release/bundle .

      - name: Upload to Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.ref_name }}
          files: ainas-frontend-linux.tar.gz
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/upload-artifact@v5
        with:
          name: ainas-frontend-linux
          path: ainas-frontend-linux.tar.gz

  # ─── Windows ───────────────────────────────────────────────────────
  ainas-frontend-windows:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v5

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.44.3"
          channel: stable

      - working-directory: frontend
        shell: bash
        run: |
          if [[ ! -d "windows" ]]; then
            flutter create --platforms windows .
          fi
          flutter pub get

      - name: Build Windows
        working-directory: frontend
        run: flutter build windows --release

      - name: Create zip
        working-directory: frontend\build\windows\x64\runner\Release
        run: |
          Compress-Archive -Path * -DestinationPath ${{ github.workspace }}/ainas-frontend-windows.zip

      - name: Upload to Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.ref_name }}
          files: ainas-frontend-windows.zip
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/upload-artifact@v5
        with:
           name: ainas-frontend-windows
           path: ainas-frontend-windows.zip

  # ─── Windows (Win7 target) ──────────────────────────────────────────
  ainas-frontend-windows7:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v5

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.44.3"
          channel: stable

      - name: Pin Win7 target in CMakeLists.txt
        working-directory: frontend
        shell: bash
        run: |
          sed -i 's/set(TARGET_WINDOWS_VER "[^"]*"/set(TARGET_WINDOWS_VER "0x0601"/' \
            windows/CMakeLists.txt

      - working-directory: frontend
        shell: bash
        run: |
          if [[ ! -d "windows" ]]; then
            flutter create --platforms windows .
          fi
          flutter pub get

      - name: Build Windows (Win7 target)
        working-directory: frontend
        run: flutter build windows --release

      - name: Create zip
        working-directory: frontend\build\windows\x64\runner\Release
        run: |
          Compress-Archive -Path * -DestinationPath ${{ github.workspace }}/ainas-frontend-windows7.zip

      - name: Upload to Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.ref_name }}
          files: ainas-frontend-windows7.zip
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/upload-artifact@v5
        with:
          name: ainas-frontend-windows7
          path: ainas-frontend-windows7.zip

  # ─── C++ Backend: Linux ─────────────────────────────────────────────
  ainas-backendcpp-linux:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v5
        with:
          submodules: true

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libavahi-compat-libdnssd-dev

      - name: Configure CMake
        working-directory: backendcpp
        run: |
          mkdir -p build
          cmake -S . -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        working-directory: backendcpp
        run: cmake --build build --parallel --config Release

      - name: Package binary
        run: tar czf ainas-backendcpp-linux.tar.gz -C backendcpp/build/src ainas-backend-cpp

      - name: Upload to Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.ref_name }}
          files: ainas-backendcpp-linux.tar.gz
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/upload-artifact@v5
        with:
          name: ainas-backendcpp-linux
          path: ainas-backendcpp-linux.tar.gz

  # ─── C++ Backend: macOS ──────────────────────────────────────────────
  ainas-backendcpp-macos:
    runs-on: macos-latest
    defaults:
      run:
        shell: bash
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v5
        with:
          submodules: true

      - name: Configure CMake
        working-directory: backendcpp
        run: |
          mkdir -p build
          cmake -S . -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        working-directory: backendcpp
        run: cmake --build build --parallel --config Release

      - name: Package binary
        run: tar czf ainas-backendcpp-macos.tar.gz -C backendcpp/build/src ainas-backend-cpp

      - name: Upload to Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.ref_name }}
          files: ainas-backendcpp-macos.tar.gz
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/upload-artifact@v5
        with:
          name: ainas-backendcpp-macos
          path: ainas-backendcpp-macos.tar.gz

  # ─── C++ Backend: Windows ───────────────────────────────────────────
  ainas-backendcpp-windows:
    runs-on: windows-latest
    defaults:
      run:
        shell: bash
    permissions:
      contents: write

    steps:
      # Fix 1: Add submodules: true so vendor/oatpp actually gets checked out
      - uses: actions/checkout@v5
        with:
          submodules: true

      # Fix 2: Download and drop SQLite amalgamation source into vendor
      - name: Install SQLite amalgamation
        run: |
          curl -fsSL https://www.sqlite.org/2024/sqlite-amalgamation-3460100.zip \
            -o sqlite-amal.zip
          unzip -q sqlite-amal.zip
          cp sqlite-amalgamation-*/sqlite3.{c,h} backendcpp/vendor/

      # Fix 3: Direct CMake to treat the amalgamation files as the source library
      - name: Configure CMake
        working-directory: backendcpp
        run: |
          mkdir -p build
          cmake -S . -B build -DCMAKE_BUILD_TYPE=Release \
            -DSQLITE3_INCLUDE_DIRS="$GITHUB_WORKSPACE/backendcpp/vendor" \
            -DSQLITE3_LIBRARIES="$GITHUB_WORKSPACE/backendcpp/vendor/sqlite3.c"

      - name: Build
        working-directory: backendcpp
        run: cmake --build build --parallel --config Release

      - name: Package binary
        run: |
          cd backendcpp/build/src/Release   # MSVC outputs to a build configuration subfolder
          echo "Current Path: $(pwd)"
          ls -la
          tar czf ainas-backendcpp-windows.tar.gz ainas-backend-cpp.exe
          cd ../../../../
          echo "Current Path: $(pwd)"
          ls -la
          mv backendcpp/build/src/Release/ainas-backendcpp-windows.tar.gz ainas-backendcpp-windows.tar.gz

      - name: Upload to Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.ref_name }}
          files: ainas-backendcpp-windows.tar.gz
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/upload-artifact@v5
        with:
           name: ainas-backendcpp-windows
           path: ainas-backendcpp-windows.tar.gz

  # ─── C++ Backend: Windows (Win7) ────────────────────────────────────
  ainas-backendcpp-windows7:
    runs-on: windows-latest
    defaults:
      run:
        shell: bash
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v5
        with:
          submodules: true

      - name: Install SQLite amalgamation
        run: |
          curl -fsSL https://www.sqlite.org/2024/sqlite-amalgamation-3460100.zip \
            -o sqlite-amal.zip
          unzip -q sqlite-amal.zip
          cp sqlite-amalgamation-*/sqlite3.{c,h} backendcpp/vendor/

      - name: Configure CMake (Win7 target)
        working-directory: backendcpp
        run: |
          mkdir -p build
          cmake -S . -B build -DCMAKE_BUILD_TYPE=Release \
            -DTARGET_WINDOWS_VER=0x0601 \
            -DSQLITE3_INCLUDE_DIRS="$GITHUB_WORKSPACE/backendcpp/vendor" \
            -DSQLITE3_LIBRARIES="$GITHUB_WORKSPACE/backendcpp/vendor/sqlite3.c"

      - name: Build
        working-directory: backendcpp
        run: cmake --build build --parallel --config Release

      - name: Package binary
        run: |
          cd backendcpp/build/src/Release
          echo "Current Path: $(pwd)"
          ls -la
          tar czf ainas-backendcpp-windows7.tar.gz ainas-backend-cpp.exe
          cd ../../../../
          echo "Current Path: $(pwd)"
          ls -la
          mv backendcpp/build/src/Release/ainas-backendcpp-windows7.tar.gz ainas-backendcpp-windows7.tar.gz

      - name: Upload to Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.ref_name }}
          files: ainas-backendcpp-windows7.tar.gz
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/upload-artifact@v5
        with:
          name: ainas-backendcpp-windows7
          path: ainas-backendcpp-windows7.tar.gz

  # ─── Full bundles: Flutter frontend + C++ backend ──────────────────
  ainas-full-linux:
    needs: [ainas-frontend-linux, ainas-backendcpp-linux]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v5
        with:
          submodules: true

      - name: Download Flutter Linux bundle
        uses: actions/download-artifact@v5
        with:
          name: ainas-frontend-linux
          path: dl/linux

      - name: Download C++ backend (Linux)
        uses: actions/download-artifact@v5
        with:
          name: ainas-backendcpp-linux
          path: dl/backend-linux

      - name: Assemble bundle
        run: |
          mkdir -p bundle
          tar xzf dl/linux/ainas-frontend-linux.tar.gz -C bundle
          tar xzf dl/backend-linux/ainas-backendcpp-linux.tar.gz -C bundle
          chmod +x bundle/ainas_frontend bundle/run.sh bundle/ainas-backend-cpp 2>/dev/null || true

      - name: Create archive
        run: tar czf ainas-full-linux.tar.gz -C bundle .

      - name: Upload to Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.ref_name }}
          files: ainas-full-linux.tar.gz
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/upload-artifact@v5
        with:
          name: ainas-full-linux
          path: ainas-full-linux.tar.gz

  # ── macOS full bundle ──────────────────────────────────────────────
  ainas-full-macos:
    needs: [ainas-frontend-macos, ainas-backendcpp-macos]
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - name: Download Flutter macOS app
        uses: actions/download-artifact@v5
        with:
          name: ainas-frontend-macos
          path: dl/macos

      - name: Download C++ backend (macOS)
        uses: actions/download-artifact@v5
        with:
          name: ainas-backendcpp-macos
          path: dl/backend-macos

      - name: Assemble bundle
        run: |
          mkdir -p staging
          unzip -q dl/macos/ainas-frontend-macos.zip -d staging
          APP=$(find staging -maxdepth 1 -name "*.app" | head -1)
          MACOS_DIR="$APP/Contents/MacOS"
          tar xzf dl/backend-macos/ainas-backendcpp-macos.tar.gz -C "$MACOS_DIR"
          chmod +x "$MACOS_DIR/ainas-backend-cpp" || true

      - name: Create archive
        run: |
          APP=$(find staging -maxdepth 1 -name "*.app" | head -1)
          ditto -c -k --keepParent "$APP" ainas-full-macos.zip

      - name: Upload to Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.ref_name }}
          files: ainas-full-macos.zip
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/upload-artifact@v5
        with:
          name: ainas-full-macos
          path: ainas-full-macos.zip

  # ── Windows full bundle ────────────────────────────────────────────
  ainas-full-windows:
    needs: [ainas-frontend-windows, ainas-backendcpp-windows]
    runs-on: windows-latest
    defaults:
      run:
        shell: bash
    permissions:
      contents: write

    steps:
      - name: Download Flutter Windows bundle
        uses: actions/download-artifact@v5
        with:
          name: ainas-frontend-windows
          path: dl/windows

      - name: Download C++ backend (Windows)
        uses: actions/download-artifact@v5
        with:
          name: ainas-backendcpp-windows
          path: dl/backend-windows

      - name: Assemble bundle
        run: |
          mkdir -p bundle
          unzip -q dl/windows/ainas-frontend-windows.zip -d bundle
          tar xzf dl/backend-windows/ainas-backendcpp-windows.tar.gz -C bundle

      - name: Create zip
        shell: pwsh
        run: |
          Compress-Archive -Path bundle\* `
            -DestinationPath "${{ github.workspace }}\ainas-full-windows.zip"

      - name: Upload to Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.ref_name }}
          files: ainas-full-windows.zip
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/upload-artifact@v5
        with:
          name: ainas-full-windows
          path: ainas-full-windows.zip

  # ── Windows full bundle (Win7) ─────────────────────────────────────
  ainas-full-windows7:
    needs: [ainas-frontend-windows7, ainas-backendcpp-windows7]
    runs-on: windows-latest
    defaults:
      run:
        shell: bash
    permissions:
      contents: write

    steps:
      - name: Download Flutter Windows bundle (Win7)
        uses: actions/download-artifact@v5
        with:
          name: ainas-frontend-windows7
          path: dl/windows

      - name: Download C++ backend (Win7)
        uses: actions/download-artifact@v5
        with:
          name: ainas-backendcpp-windows7
          path: dl/backend-windows

      - name: Assemble bundle
        run: |
          mkdir -p bundle
          unzip -q dl/windows/ainas-frontend-windows7.zip -d bundle
          tar xzf dl/backend-windows/ainas-backendcpp-windows7.tar.gz -C bundle

      - name: Create zip
        shell: pwsh
        run: |
          Compress-Archive -Path bundle\* `
            -DestinationPath "${{ github.workspace }}\ainas-full-windows7.zip"

      - name: Upload to Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.ref_name }}
          files: ainas-full-windows7.zip
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/upload-artifact@v5
        with:
          name: ainas-full-windows7
          path: ainas-full-windows7.zip

  # ── Android full bundle (APK + embedded backend binaries) ──────────
  ainas-full-android:
    needs: [ainas-frontend-android]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    env:
      NDK_VERSION: "27.2.12479018"
      ANDROID_API: "24"

    steps:
      - uses: actions/checkout@v5
        with:
          submodules: true

      - uses: actions/setup-java@v5
        with:
          java-version: "21"
          distribution: "temurin"

      - uses: android-actions/setup-android@v4

      - name: Install Android NDK
        run: |
          sdkmanager --install "ndk;${{ env.NDK_VERSION }}"

      - name: Install SQLite amalgamation (for Android cross-build)
        run: |
          curl -fsSL https://www.sqlite.org/2024/sqlite-amalgamation-3460100.zip \
            -o sqlite-amal.zip
          unzip -q sqlite-amal.zip
          cp sqlite-amalgamation-*/sqlite3.{c,h} backendcpp/vendor/

      - name: Build backend for arm64-v8a
        run: |
          NDK_PATH="$ANDROID_SDK_ROOT/ndk/${{ env.NDK_VERSION }}"
          TOOLCHAIN="$NDK_PATH/build/cmake/android.toolchain.cmake"
          cmake -S backendcpp -B build-android-arm64 \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_TOOLCHAIN_FILE="$TOOLCHAIN" \
            -DANDROID_ABI=arm64-v8a \
            -DANDROID_PLATFORM=android-${{ env.ANDROID_API }} \
            -DCMAKE_FIND_ROOT_PATH_MODE_LIBRARY=ONLY \
            -DCMAKE_FIND_ROOT_PATH_MODE_INCLUDE=ONLY \
            -DSQLITE3_INCLUDE_DIRS="$GITHUB_WORKSPACE/backendcpp/vendor" \
            -DSQLITE3_LIBRARIES="$GITHUB_WORKSPACE/backendcpp/vendor/sqlite3.c"
          cmake --build build-android-arm64 --parallel --config Release

      - name: Build backend for x86_64
        run: |
          NDK_PATH="$ANDROID_SDK_ROOT/ndk/${{ env.NDK_VERSION }}"
          TOOLCHAIN="$NDK_PATH/build/cmake/android.toolchain.cmake"
          cmake -S backendcpp -B build-android-x86_64 \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_TOOLCHAIN_FILE="$TOOLCHAIN" \
            -DANDROID_ABI=x86_64 \
            -DANDROID_PLATFORM=android-${{ env.ANDROID_API }} \
            -DCMAKE_FIND_ROOT_PATH_MODE_LIBRARY=ONLY \
            -DCMAKE_FIND_ROOT_PATH_MODE_INCLUDE=ONLY \
            -DSQLITE3_INCLUDE_DIRS="$GITHUB_WORKSPACE/backendcpp/vendor" \
            -DSQLITE3_LIBRARIES="$GITHUB_WORKSPACE/backendcpp/vendor/sqlite3.c"
          cmake --build build-android-x86_64 --parallel --config Release

      - name: Download Flutter APK
        uses: actions/download-artifact@v5
        with:
          name: ainas-frontend-android
          path: dl/android

      - name: Inject backend binaries into APK
        run: |
          APK="dl/android/app-release.apk"
          cp "$APK" ainas-full-android.apk

          mkdir -p apk-inject/assets/backend/arm64-v8a
          mkdir -p apk-inject/assets/backend/x86_64

          cp build-android-arm64/src/ainas-backend-cpp \
             apk-inject/assets/backend/arm64-v8a/ainas-backend-cpp
          cp build-android-x86_64/src/ainas-backend-cpp \
             apk-inject/assets/backend/x86_64/ainas-backend-cpp

          cd apk-inject
          zip -0 -r "$GITHUB_WORKSPACE/ainas-full-android.apk" assets/

      - name: Upload to Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.ref_name }}
          files: ainas-full-android.apk
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/upload-artifact@v5
        with:
          name: ainas-full-android
          path: ainas-full-android.apk

  # ── iOS full bundle (.app + embedded backend binary) ───────────────
  ainas-full-ios:
    needs: [ainas-frontend-ios]
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v5
        with:
          submodules: true

      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest

      - name: Install SQLite (via Homebrew for host tools; amalgamation for cross)
        run: |
          curl -fsSL https://www.sqlite.org/2024/sqlite-amalgamation-3460100.zip \
            -o sqlite-amal.zip
          unzip -q sqlite-amal.zip
          cp sqlite-amalgamation-*/sqlite3.{c,h} backendcpp/vendor/

      - name: Build backend for arm64-apple-ios (device)
        run: |
          cmake -S backendcpp -B build-ios-arm64 \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_SYSTEM_NAME=iOS \
            -DCMAKE_OSX_ARCHITECTURES=arm64 \
            -DCMAKE_OSX_DEPLOYMENT_TARGET=16.0 \
            -DCMAKE_OSX_SYSROOT="$(xcrun --sdk iphoneos --show-sdk-path)" \
            -DSQLITE3_INCLUDE_DIRS="$GITHUB_WORKSPACE/backendcpp/vendor" \
            -DSQLITE3_LIBRARIES="$GITHUB_WORKSPACE/backendcpp/vendor/sqlite3.c"
          cmake --build build-ios-arm64 --parallel --config Release

      - name: Download Flutter iOS app
        uses: actions/download-artifact@v5
        with:
          name: ainas-frontend-ios
          path: dl/ios

      - name: Inject backend binary into .app bundle
        run: |
          unzip -q dl/ios/ainas-frontend-ios.zip -d staging-ios
          APP=$(find staging-ios -maxdepth 1 -name "*.app" | head -1)

          DEST="$APP/Frameworks"
          mkdir -p "$DEST"
          cp build-ios-arm64/src/ainas-backend-cpp "$DEST/ainas-backend-cpp"
          chmod +x "$DEST/ainas-backend-cpp"

      - name: Create archive
        run: |
          APP=$(find staging-ios -maxdepth 1 -name "*.app" | head -1)
          ditto -c -k --keepParent "$APP" ainas-full-ios.zip

      - name: Upload to Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.ref_name }}
          files: ainas-full-ios.zip
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/upload-artifact@v5
        with:
          name: ainas-full-ios
          path: ainas-full-ios.zip