name: ainas_frontend
description: A Flutter-based GUI for the AI-NAS.
version: 1.0.0+1
environment:
  sdk: ">=3.0.0 <4.0.0"
dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: ^0.20.2
  nsd: ^5.0.1
  http: ^1.1.0
  logging: ^1.3.0
  file_picker: ^8.1.2
  syncfusion_flutter_pdfviewer: ^33.2.12
  webview_flutter: ^4.4.2
  path: ^1.8.3
  shared_preferences: ^2.2.0
  multicast_dns: ^0.3.2+6
dev_dependencies:
  flutter_test:
    sdk: flutter

flutter:
  generate: true
  uses-material-design: true