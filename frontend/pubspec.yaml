name: ainas_frontend
description: A Flutter-based GUI for the AI-NAS.
version: 1.0.0+1
environment:
  sdk: ">=3.0.0 <4.0.0"
dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: ^0.20.2
  nsd: ^5.0.1
  http: ^1.1.0
  logging: ^1.3.0
  file_picker: ^12.0.0-beta.7
  syncfusion_flutter_pdfviewer: ^33.2.12
  webview_flutter: ^4.4.2
  path: ^1.8.3
  shared_preferences: ^2.2.0
  multicast_dns: ^0.3.2+6
  url_launcher: ^6.3.0
  cached_network_image_ce: ^4.9.0
  video_player: ^2.9.2
  chewie: ^1.10.0
  flutter_tts: ^4.2.5
  flutter_markdown: ^0.7.6
  device_info_plus: ^13.1.0
  path_provider: ^2.1.0
  isar: ^3.1.0+1
  isar_flutter_libs: ^3.1.0+1
  window_manager: ^0.4.3
  tray_manager: ^0.3.0
dev_dependencies:
  build_runner: ^2.4.0
  isar_generator: ^3.1.0+1
  flutter_test:
    sdk: flutter

flutter:
  generate: true
  uses-material-design: true
  assets:
    - assets/tray_icon.png
    - assets/tray_icon.ico